<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Lots of love from ntđ for pqt 💗</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      width: 100%;
      height: 100%;
      background: #000;
    }

    body {
      width: 100vw;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      transform: translateZ(0);
      font-family: "Cormorant Garamond", serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(80, 80, 180, 0.25), transparent 30%),
        radial-gradient(circle at 80% 70%, rgba(120, 40, 160, 0.22), transparent 28%),
        linear-gradient(180deg, #020414 0%, #050816 50%, #000 100%);
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      contain: layout paint style;
      isolation: isolate;
      transform: translateZ(0);
      padding:
        var(--safe-top)
        var(--safe-right)
        var(--safe-bottom)
        var(--safe-left);
    }

    .star,
    .fall-item {
      position: absolute;
      left: 0;
      top: -140px;
      pointer-events: none;
      user-select: none;
      will-change: transform, opacity;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .star {
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      background: white;
      opacity: 0;
      box-shadow: 0 0 8px white;
      animation: starFall var(--duration) linear forwards;
    }

    @keyframes starFall {
      0% {
        transform: translate3d(0, -30px, 0);
        opacity: 0;
      }

      8% {
        opacity: var(--opacity);
      }

      100% {
        transform: translate3d(0, calc(100dvh + 180px), 0);
        opacity: 0;
      }
    }

    .fall-item {
      opacity: 0;
      animation: fall var(--duration) linear forwards;
      transform: translateZ(0);
    }

    @keyframes fall {
      0% {
        transform:
          translate3d(0, -40px, 0)
          rotate(0deg)
          scale(var(--scale));
        opacity: 0;
      }

      7% {
        opacity: var(--opacity);
      }

      92% {
        opacity: var(--opacity);
      }

      100% {
        transform:
          translate3d(0, calc(100dvh + 220px), 0)
          rotate(var(--rotate))
          scale(var(--scale));
        opacity: 0;
      }
    }

    .heart {
      color: #ff4f9a;
      font-size: var(--size);
      text-shadow:
        0 0 8px rgba(255, 79, 154, 0.95),
        0 0 18px rgba(255, 79, 154, 0.65),
        0 0 32px rgba(255, 79, 154, 0.35);
    }

    .small-text {
      color: var(--text-color);
      transform: translateZ(0);
      font-size: var(--size);
      font-weight: 600;
      font-family: "Cormorant Garamond", serif;
      --text-color: #ffffff;
      letter-spacing: 0.04em;
      white-space: nowrap;
      text-shadow:
        0 0 6px var(--text-color),
        0 0 14px var(--text-color);
    }

    .photo {
      width: var(--size);
      transform: translateZ(0);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      height: var(--size);
      border-radius: clamp(10px, 2.2vmin, 18px);
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.78);
      box-shadow:
        0 0 12px rgba(255, 255, 255, 0.65),
        0 0 24px rgba(255, 90, 170, 0.5);
      display: block;
    }

    .firework {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: 1px;
      height: 1px;
      pointer-events: none;
      z-index: 4;
    }

    .heart-particle {
      position: absolute;
      transform: translateZ(0);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      left: 0;
      top: 0;
      width: var(--particle-size);
      height: var(--particle-size);
      border-radius: 50%;
      background: var(--particle-color);
      box-shadow:
        0 0 8px var(--particle-color),
        0 0 18px var(--particle-color);
      opacity: 0;
      animation: heartBurst 1.45s ease-out forwards;
      animation-delay: var(--delay);
    }

    @keyframes heartBurst {
      0% {
        transform: translate3d(0, 0, 0) scale(0.25);
        opacity: 1;
      }

      55% {
        opacity: 1;
      }

      100% {
        transform: translate3d(var(--tx), var(--ty), 0) scale(0.95);
        opacity: 0;
      }
    }

    .heart-core {
      position: absolute;
      left: -12px;
      top: -12px;
      font-size: clamp(18px, 2.8vmin, 24px);
      color: #ff4f9a;
      text-shadow:
        0 0 10px rgba(255, 79, 154, 1),
        0 0 24px rgba(255, 79, 154, 0.75);
      animation: corePulse 1.1s ease-out forwards;
    }

    @keyframes corePulse {
      0% {
        transform: scale(0.2);
        opacity: 0;
      }

      25% {
        transform: scale(1.2);
        opacity: 1;
      }

      100% {
        transform: scale(0.6);
        opacity: 0;
      }
    }

    @media (max-width: 768px) {
      .small-text {
        letter-spacing: 0.02em;
        font-weight: 600;
      }

      .photo {
        border-width: 1.5px;
      }
    }

    .music-toggle {
      position: fixed;
      right: max(14px, var(--safe-right));
      bottom: max(14px, var(--safe-bottom));
      z-index: 30;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 50%;
      background: rgba(255, 79, 154, 0.18);
      color: white;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:
        0 0 12px rgba(255, 79, 154, 0.45),
        0 0 24px rgba(255, 255, 255, 0.18);
      transition:
        transform 0.2s ease,
        background 0.2s ease,
        box-shadow 0.2s ease;
    }

    .music-toggle:active {
      transform: scale(0.92);
    }

    .music-toggle.playing {
      background: rgba(255, 79, 154, 0.42);
      box-shadow:
        0 0 16px rgba(255, 79, 154, 0.85),
        0 0 32px rgba(255, 255, 255, 0.25);
    }

    @media (max-width: 768px) {
      .music-toggle {
        width: 42px;
        height: 42px;
        font-size: 18px;
      }
    }


    .intro-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 79, 154, 0.24), transparent 24%),
        radial-gradient(circle at 20% 20%, rgba(80, 80, 180, 0.26), transparent 32%),
        radial-gradient(circle at 80% 72%, rgba(120, 40, 160, 0.24), transparent 30%),
        linear-gradient(180deg, #020414 0%, #050816 55%, #000 100%);
      opacity: 1;
      visibility: visible;
      transition:
        opacity 1.15s ease,
        visibility 1.15s ease;
      cursor: pointer;
      overflow: hidden;
    }

    .intro-screen.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .intro-title {
      position: relative;
      z-index: 2;
      color: #ffffff;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(34px, 8vw, 86px);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-align: center;
      text-shadow:
        0 0 10px rgba(255, 255, 255, 0.95),
        0 0 24px rgba(255, 79, 154, 0.82),
        0 0 46px rgba(255, 126, 191, 0.65);
      animation: introPulse 1.8s ease-in-out infinite alternate;
      user-select: none;
      -webkit-user-select: none;
    }

    .intro-title::after {
      content: "♥";
      display: block;
      margin-top: 16px;
      font-size: clamp(30px, 7vw, 70px);
      color: #ff4f9a;
      text-shadow:
        0 0 10px rgba(255, 79, 154, 1),
        0 0 26px rgba(255, 79, 154, 0.9),
        0 0 46px rgba(255, 255, 255, 0.35);
      animation: introHeartBeat 1.05s ease-in-out infinite;
    }

    .intro-screen::before,
    .intro-screen::after {
      content: "";
      position: absolute;
      width: 48vmin;
      height: 48vmin;
      border-radius: 50%;
      background: rgba(255, 79, 154, 0.08);
      filter: blur(20px);
      animation: introGlow 3.2s ease-in-out infinite alternate;
    }

    .intro-screen::before {
      left: -12vmin;
      top: 12vmin;
    }

    .intro-screen::after {
      right: -12vmin;
      bottom: 10vmin;
      animation-delay: 0.7s;
    }

    @keyframes introPulse {
      from {
        transform: scale(0.98);
        opacity: 0.86;
      }

      to {
        transform: scale(1.03);
        opacity: 1;
      }
    }

    @keyframes introHeartBeat {
      0%, 100% {
        transform: scale(1);
      }

      35% {
        transform: scale(1.18);
      }

      60% {
        transform: scale(0.96);
      }
    }

    @keyframes introGlow {
      from {
        transform: scale(0.9);
        opacity: 0.35;
      }

      to {
        transform: scale(1.15);
        opacity: 0.75;
      }
    }

    .scene {
      opacity: 0;
      transition: opacity 1.15s ease;
    }

    body.started .scene {
      opacity: 1;
    }

    @media (max-width: 768px) {
      .intro-title {
        font-size: clamp(34px, 10vw, 56px);
        line-height: 1.1;
      }

      .intro-title::after {
        margin-top: 14px;
      }
    }

  </style>
</head>

<body>
  <div class="intro-screen" id="introScreen">
    <div class="intro-title">Touch My Heart</div>
  </div>

  <div class="scene" id="scene"></div>

  <!--
    Thêm nhạc:
    1. Tạo thư mục music cùng cấp với file HTML
    2. Đặt file nhạc vào thư mục đó và đổi tên thành bg-music.mp3
    3. Đường dẫn nhạc là: music/bg-music.mp3
  -->
  <audio id="bgMusic" src="music/bg-music.mp3" autoplay loop playsinline preload="auto"></audio>
  <button class="music-toggle" id="musicToggle" aria-label="Bật hoặc tắt nhạc">♪</button>

  <script>
    const scene = document.getElementById("scene");
    const introScreen = document.getElementById("introScreen");
    let hasStarted = false;

    const bgMusic = document.getElementById("bgMusic");
    const musicToggle = document.getElementById("musicToggle");

    bgMusic.volume = 0.6;
    bgMusic.loop = true;
    bgMusic.autoplay = true;

    async function playMusic() {
      try {
        bgMusic.muted = false;
        bgMusic.loop = true;
        await bgMusic.play();
        musicToggle.classList.add("playing");
        musicToggle.textContent = "♫";
      } catch (error) {
        musicToggle.classList.remove("playing");
        musicToggle.textContent = "♪";
        console.log("Trình duyệt có thể chặn nhạc tự phát có tiếng. Hãy chạm màn hình một lần để bật nhạc.");
      }
    }

    function pauseMusic() {
      bgMusic.pause();
      musicToggle.classList.remove("playing");
      musicToggle.textContent = "♪";
    }

    async function toggleMusic() {
      if (bgMusic.paused) {
        await playMusic();
      } else {
        pauseMusic();
      }
    }

    // Tự động thử phát nhạc khi trang vừa mở
    document.addEventListener("DOMContentLoaded", () => {
      playMusic();
    });

    window.addEventListener("load", () => {
      playMusic();
    });

    // Nếu bài hát kết thúc hoặc bị ngắt, tự phát lại
    bgMusic.addEventListener("ended", () => {
      bgMusic.currentTime = 0;
      playMusic();
    });

    bgMusic.addEventListener("pause", () => {
      // Nếu không phải người dùng bấm nút tắt, thử phát lại sau một nhịp ngắn
      if (!musicToggle.dataset.userPaused) {
        setTimeout(() => {
          if (bgMusic.paused) {
            playMusic();
          }
        }, 500);
      }
    });

    // Bấm nút nhạc để bật/tắt. Chặn lan sự kiện để không tạo pháo hoa khi bấm nút.
    musicToggle.addEventListener("pointerdown", (event) => {
      event.stopPropagation();
    });

    musicToggle.addEventListener("click", (event) => {
      event.stopPropagation();

      if (bgMusic.paused) {
        musicToggle.dataset.userPaused = "";
        playMusic();
      } else {
        musicToggle.dataset.userPaused = "true";
        pauseMusic();
      }
    });

    // Trên điện thoại, nhạc có tiếng thường chỉ được phát sau khi người dùng tương tác.
    // Lần chạm đầu tiên vào màn hình sẽ bật nhạc nếu trình duyệt đã chặn autoplay.
    window.addEventListener("pointerdown", () => {
      if (hasStarted && bgMusic.paused) {
        musicToggle.dataset.userPaused = "";
        playMusic();
      }
    }, { once: true });

    // Khi quay lại tab/trang, tự phát lại nếu đang bị dừng
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden && bgMusic.paused && !musicToggle.dataset.userPaused) {
        playMusic();
      }
    });

    const images = [
      "images/anh1.jpg",
      "images/anh2.jpg",
      "images/anh3.jpg",
      "images/anh4.jpg",
      "images/anh5.png",
      "images/anh6.png",
      "images/anh7.png",
      "images/anh8.png",
      "images/anh9.jpg",
      "images/anh10.jpg",
      "images/anh11.jpeg",
      "images/anh12.jpeg",
      "images/anh13.jpeg",
      "images/anh14.jpeg",
      "images/anh15.jpeg",
      "images/anh16.jpeg",
      "images/anh17.jpeg",
      "images/anh18.jpeg",
      "images/anh19.jpeg",
      "images/anh20.jpeg",
      "images/anh21.jpeg",
      "images/anh22.jpeg",
      "images/anh23.jpeg",
      "images/anh24.jpeg",
      "images/anh25.jpeg",
      "images/anh26.jpeg",
      "images/anh27.jpeg",
      "images/anh28.jpeg",
      "images/anh29.jpeg",
      "images/anh30.jpeg",
      "images/anh31.jpeg",
      "images/anh32.jpeg",
      "images/anh33.jpeg"
    ];

    const texts = [
      "Anh yêu em",
      "love you",
      "Tôi yêu pqt nhất trên đời",
      "Yêu em mãi mãi",
      "anh iu pqt",
      "iu em",
      "ntđ ♡ pqt",
      "pqt tuyệt vời nhất",
      "yêu em nhất thế gian",
      "pqt là tất cả của anh",
    ];

    const hearts = ["❤️", "💖", "💕", "💗", "💘", "💞", "💓", "💝"];

    const fireworkColors = [
      "#ff4f9a",
      "#ff7abf",
      "#ffffff",
      "#ffd1e8",
      "#ff9ed2"
    ];

    const textColors = [
      "#ff4f9a",
      "#ff7abf",
      "#ffffff",
      "#ffd1e8",
      "#ff9ed2",
      "#ff6fb3",
      "#ffc1df"
    ];

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function randomItem(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function removeAfterAnimation(el, duration) {
      setTimeout(() => el.remove(), duration + 500);
    }

    function heartTiltAngle() {
      return random(-30, 30);
    }

    function createLaneDistributor(laneCount, jitterRatio = 0.18) {
      let order = shuffle([...Array(laneCount).keys()]);
      let index = 0;

      function nextXPercent() {
        if (index >= order.length) {
          order = shuffle([...Array(laneCount).keys()]);
          index = 0;
        }

        const lane = order[index++];
        const laneWidth = 100 / laneCount;
        const center = lane * laneWidth + laneWidth / 2;
        const jitter = laneWidth * jitterRatio;

        return center + random(-jitter, jitter);
      }

      return {
        nextXPercent
      };
    }

    function getResponsiveConfig() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const shortSide = Math.min(w, h);
      const isMobile = w <= 768;
      const isSmallMobile = w <= 420;

      return {
        isMobile,
        isSmallMobile,
        starLaneCount: isMobile ? (isSmallMobile ? 24 : 28) : 42,
        itemLaneCount: isMobile ? (isSmallMobile ? 12 : 14) : 24,
        starJitter: isMobile ? 0.10 : 0.14,
        itemJitter: isMobile ? 0.06 : 0.10,

        starInterval: isMobile ? 56 : 50,
        itemInterval: isMobile ? 110 : 95,
        textInterval: isMobile ? 125 : 150,
        fireworkInterval: isMobile ? 1900 : 1700,

        heartSizeMin: isMobile ? 10 : 14,
        heartSizeMax: isMobile ? 20 : 30,

        textSizeMin: isMobile ? 10 : 11,
        textSizeMax: isMobile ? 12 : 15,

        photoSizeMin: isMobile ? 25 : 35,
        photoSizeMax: isMobile ? 40 : 60,

        fireworkScaleMin: isMobile ? 4.3 : 5.2,
        fireworkScaleMax: isMobile ? 6.0 : 7.4,
        particleCount: isMobile ? 48 : 60,

        initialStars: isMobile ? 60 : 85,
        initialItems: isMobile ? 32 : 46,
        initialTexts: isMobile ? 22 : 32
      };
    }

    let config = getResponsiveConfig();
    let starLanes = createLaneDistributor(config.starLaneCount, config.starJitter);
    let itemLanes = createLaneDistributor(config.itemLaneCount, config.itemJitter);

    function rebuildResponsiveLayout() {
      config = getResponsiveConfig();
      starLanes = createLaneDistributor(config.starLaneCount, config.starJitter);
      itemLanes = createLaneDistributor(config.itemLaneCount, config.itemJitter);
    }

    function debounce(fn, delay = 180) {
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    function createStar() {
      const star = document.createElement("span");
      star.className = "star";

      const duration = random(5200, 11200);

      star.style.left = starLanes.nextXPercent() + "vw";
      star.style.setProperty("--size", random(1.1, 3.2) + "px");
      star.style.setProperty("--duration", duration + "ms");
      star.style.setProperty("--opacity", random(0.4, 1));

      scene.appendChild(star);
      removeAfterAnimation(star, duration);
    }

    function createFallingItem() {
      const item = document.createElement("div");
      item.className = "fall-item";

      const typeChance = Math.random();
      const duration = random(5600, 11000);

      if (typeChance < 0.48) {
        item.classList.add("heart");
        item.textContent = randomItem(hearts);
        item.style.setProperty("--size", random(config.heartSizeMin, config.heartSizeMax) + "px");
        item.style.setProperty("--drift", "0px");
        item.style.setProperty("--rotate", heartTiltAngle() + "deg");

      } else if (typeChance < 0.78) {
        item.classList.add("small-text");
        item.textContent = randomItem(texts);
        item.style.setProperty("--size", random(config.textSizeMin, config.textSizeMax) + "px");
        item.style.setProperty("--text-color", randomItem(textColors));
        item.style.setProperty("--drift", "0px");
        item.style.setProperty("--rotate", "0deg");

      } else {
        const img = document.createElement("img");
        img.className = "photo";
        img.src = randomItem(images);
        img.alt = "falling photo";
        img.onerror = () => item.remove();

        item.appendChild(img);
        item.style.setProperty("--size", random(config.photoSizeMin, config.photoSizeMax) + "px");
        item.style.setProperty("--drift", "0px");
        item.style.setProperty("--rotate", "0deg");
      }

      item.style.left = itemLanes.nextXPercent() + "vw";
      item.style.setProperty("--duration", duration + "ms");
      item.style.setProperty("--scale", random(0.78, 1.22));
      item.style.setProperty("--opacity", random(0.68, 1));

      scene.appendChild(item);
      removeAfterAnimation(item, duration);
    }

    function createExtraTextItem() {
      const item = document.createElement("div");
      item.className = "fall-item small-text";

      const duration = random(5600, 11000);

      item.textContent = randomItem(texts);
      item.style.left = itemLanes.nextXPercent() + "vw";
      item.style.setProperty("--size", random(config.textSizeMin, config.textSizeMax) + "px");
      item.style.setProperty("--text-color", randomItem(textColors));
      item.style.setProperty("--drift", "0px");
      item.style.setProperty("--rotate", "0deg");
      item.style.setProperty("--duration", duration + "ms");
      item.style.setProperty("--scale", random(0.82, 1.14));
      item.style.setProperty("--opacity", random(0.70, 1));

      scene.appendChild(item);
      removeAfterAnimation(item, duration);
    }

    function createHeartFirework(x = random(18, 82), y = random(16, 55)) {
      const firework = document.createElement("div");
      firework.className = "firework";
      firework.style.setProperty("--x", x + "vw");
      firework.style.setProperty("--y", y + "vh");

      const core = document.createElement("div");
      core.className = "heart-core";
      core.textContent = "♥";
      firework.appendChild(core);

      const particleCount = config.particleCount;
      const scale = random(config.fireworkScaleMin, config.fireworkScaleMax);

      for (let i = 0; i < particleCount; i++) {
        const t = (Math.PI * 2 * i) / particleCount;

        const heartX = 16 * Math.pow(Math.sin(t), 3);
        const heartY = -(
          13 * Math.cos(t)
          - 5 * Math.cos(2 * t)
          - 2 * Math.cos(3 * t)
          - Math.cos(4 * t)
        );

        const particle = document.createElement("span");
        particle.className = "heart-particle";

        particle.style.setProperty("--tx", heartX * scale + "px");
        particle.style.setProperty("--ty", heartY * scale + "px");
        particle.style.setProperty("--particle-size", random(2.0, 4.2) + "px");
        particle.style.setProperty("--particle-color", randomItem(fireworkColors));
        particle.style.setProperty("--delay", random(0, 0.12) + "s");

        firework.appendChild(particle);
      }

      scene.appendChild(firework);
      removeAfterAnimation(firework, 1800);
    }

    
    function startExperience(event) {
      if (hasStarted) return;
      hasStarted = true;

      const tapX = event ? (event.clientX / window.innerWidth) * 100 : 50;
      const tapY = event ? (event.clientY / window.innerHeight) * 100 : 48;

      document.body.classList.add("started");

      // Chạm vào màn mở đầu sẽ nổ pháo hoa trái tim trước khi fade sang hiệu ứng rơi
      createHeartFirework(tapX, tapY);
      setTimeout(() => createHeartFirework(50, 44), 260);
      setTimeout(() => createHeartFirework(50, 44), 520);

      // Bật nhạc sau tương tác đầu tiên để hoạt động tốt trên điện thoại
      if (typeof playMusic === "function") {
        playMusic();
      }

      setTimeout(() => {
        introScreen.classList.add("hide");
      }, 200);
    }

    introScreen.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      event.stopPropagation();
      startExperience(event);
    });

    introScreen.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopPropagation();
    });

    let lastStarTime = performance.now();
    let lastItemTime = performance.now();
    let lastTextTime = performance.now();
    let lastFireworkTime = performance.now();

    function smoothSpawnLoop(now) {
      if (now - lastStarTime >= config.starInterval) {
        createStar();
        lastStarTime = now;
      }

      if (now - lastItemTime >= config.itemInterval) {
        createFallingItem();
        lastItemTime = now;
      }

      if (now - lastTextTime >= config.textInterval) {
        createExtraTextItem();
        lastTextTime = now;
      }

      if (now - lastFireworkTime >= config.fireworkInterval) {
        createHeartFirework();
        lastFireworkTime = now;
      }

      requestAnimationFrame(smoothSpawnLoop);
    }

    requestAnimationFrame(smoothSpawnLoop);

    function seedInitialItems() {
      for (let i = 0; i < config.initialStars; i++) {
        setTimeout(createStar, i * 26);
      }

      for (let i = 0; i < config.initialItems; i++) {
        setTimeout(createFallingItem, i * 72);
      }

      for (let i = 0; i < config.initialTexts; i++) {
        setTimeout(createExtraTextItem, i * 95);
      }
    }

    seedInitialItems();

    window.addEventListener("click", (event) => {
      if (!hasStarted) return;

      const x = (event.clientX / window.innerWidth) * 100;
      const y = (event.clientY / window.innerHeight) * 100;
      createHeartFirework(x, y);
    });

    window.addEventListener("resize", debounce(() => {
      rebuildResponsiveLayout();
    }, 180));
  </script>
</body>
</html>
